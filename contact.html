<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">
      <img src="assets/images/logo.png" alt="Chic Happens Logo">
    </a>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="collections.html" data-i18n="nav.collections">Collections</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
        <li><a href="lookbook.html" data-i18n="nav.lookbook">Lookbook</a></li>
        <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <select id="langSwitcher">
      <option value="en">EN</option>
      <option value="uk">UK</option>
    </select>
  </div>
</header>

<section class="contact container">
  <h2 data-i18n="contact.title">Get in Touch</h2>
  <p data-i18n="contact.text" class="contact-text">Have questions, suggestions, or want to collaborate? Don’t be a stranger — we love hearing from you!</p>

  <div class="contact-grid">
    <!-- Contact Form -->
    <form class="contact-form">
      <input type="text" placeholder="Your name" required data-i18n-placeholder="contact.name">
      <input type="email" placeholder="Your email" required data-i18n-placeholder="contact.email">
      <textarea placeholder="Your message" required data-i18n-placeholder="contact.message"></textarea>
      <button type="submit" data-i18n="contact.cta">Send Message</button>
    </form>

    <!-- Contact Info & Socials -->
    <div class="contact-info">
      <h3 data-i18n="contact.follow">Follow Us</h3>
      <p data-i18n="contact.socials">Follow us on social media:</p>
      <div class="social-links">
        <a href="#" target="_blank">Instagram</a>
        <a href="#" target="_blank">Facebook</a>
        <a href="#" target="_blank">TikTok</a>
      </div>
      <h3 data-i18n="contact.emailLabel">Email</h3>
      <p>hello@chichappens.com</p>
      <h3 data-i18n="contact.phoneLabel">Phone</h3>
      <p>+1 (555) 123-4567</p>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
