<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Localization Demo Full</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <img id="hero_image" src="images/hero.jpg" alt="" id="hero_alt">
  <div class="hero-text">
    <h1 id="hero_title"></h1>
    <p id="hero_subtitle"></p>
    <div class="lang-switch">
      <button onclick="loadLanguage('en')">EN</button>
      <button onclick="loadLanguage('uk')">UA</button>
    </div>
  </div>
</header>

<nav>
  <a href="#" id="nav_home"></a>
  <a href="#" id="nav_about"></a>
  <a href="#" id="nav_services"></a>
  <a href="#" id="nav_testimonials"></a>
  <a href="#" id="nav_contact"></a>
</nav>

<main>
<section id="about_section">
  <h2 id="about_title"></h2>
  <p id="about_text"></p>
</section>

<section id="services_section">
  <h2 id="services_title"></h2>
  <div class="card-container">
    <div class="card">
      <img src="images/service1.jpg" alt="" id="service1_alt">
      <h3 id="service1_title"></h3>
      <p id="service1_desc"></p>
      <button id="service1_btn"></button>
    </div>
    <div class="card">
      <img src="images/service2.jpg" alt="" id="service2_alt">
      <h3 id="service2_title"></h3>
      <p id="service2_desc"></p>
      <button id="service2_btn"></button>
    </div>
  </div>
</section>

<section id="testimonials_section">
  <h2 id="testimonials_title"></h2>
  <div class="testimonial-container">
    <div class="testimonial">
      <img src="images/testimonial1.jpg" alt="" id="testimonial1_alt">
      <p id="testimonial1_text"></p>
      <p class="author" id="testimonial1_author"></p>
    </div>
    <div class="testimonial">
      <img src="images/testimonial2.jpg" alt="" id="testimonial2_alt">
      <p id="testimonial2_text"></p>
      <p class="author" id="testimonial2_author"></p>
    </div>
  </div>
</section>

<section id="gallery_section">
  <h2 id="gallery_title"></h2>
  <div class="gallery">
    <img src="images/gallery1.jpg" alt="" id="gallery1_alt">
    <img src="images/gallery2.jpg" alt="" id="gallery2_alt">
  </div>
</section>

<section id="contact_section">
  <h2 id="form_title"></h2>
  <form>
    <label id="form_name_label"></label><br>
    <input type="text" placeholder="" id="form_name_placeholder"><br>

    <label id="form_email_label"></label><br>
    <input type="email" placeholder="" id="form_email_placeholder"><br>

    <label id="form_message_label"></label><br>
    <textarea placeholder="" id="form_message_placeholder"></textarea><br>

    <button type="submit" id="form_submit"></button>
  </form>
</section>

<section id="newsletter_section">
  <h2 id="newsletter_title"></h2>
  <p id="newsletter_text"></p>
  <input type="email" placeholder="" id="newsletter_placeholder">
  <button id="newsletter_btn"></button>
</section>

<footer>
  <p id="footer_text"></p>
</footer>

<script src="app.js"></script>
</body>
</html>
